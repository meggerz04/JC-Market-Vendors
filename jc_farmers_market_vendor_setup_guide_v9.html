<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>JC Farmers Market Vendor Setup Guide</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --color-bg: #ffffff; --color-bg-secondary: #f5f5f3; --color-bg-tertiary: #eeede9;
    --color-text: #1a1a1a; --color-text-secondary: #6b6b68;
    --color-border: rgba(0,0,0,0.12); --color-border-secondary: rgba(0,0,0,0.22);
    --color-green: #1D9E75; --color-green-dark: #0F6E56; --color-green-light: #E1F5EE;
    --radius-md: 8px; --radius-lg: 12px;
    --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --color-bg: #1c1c1c; --color-bg-secondary: #262626; --color-bg-tertiary: #2e2e2e;
      --color-text: #f0f0ee; --color-text-secondary: #999994;
      --color-border: rgba(255,255,255,0.12); --color-border-secondary: rgba(255,255,255,0.22);
      --color-green-light: #0a3d2a;
    }
  }
  body { font-family: var(--font); background: var(--color-bg-tertiary); display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
  #app { display: flex; flex-direction: column; width: 100%; max-width: 560px; height: 700px; border: 0.5px solid var(--color-border); border-radius: var(--radius-lg); overflow: hidden; background: var(--color-bg); box-shadow: 0 4px 24px rgba(0,0,0,0.08); position: relative; }
  #header { padding: 12px 15px; border-bottom: 0.5px solid var(--color-border); background: var(--color-bg-secondary); display: flex; align-items: center; gap: 9px; flex-shrink: 0; z-index: 10; }
  .header-icon { width: 29px; height: 29px; background: var(--color-green); border-radius: var(--radius-md); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .header-icon svg { width: 15px; height: 15px; fill: white; }
  .header-text h2 { font-size: 12.5px; font-weight: 600; color: var(--color-text); }
  .header-text p { font-size: 11px; color: var(--color-text-secondary); }
  .tab-bar { display: flex; margin-left: auto; gap: 2px; background: var(--color-bg); border: 0.5px solid var(--color-border); border-radius: var(--radius-md); padding: 2px; }
  .tab-btn { font-size: 11px; font-family: var(--font); padding: 3px 9px; border: none; border-radius: 6px; cursor: pointer; background: transparent; color: var(--color-text-secondary); transition: background 0.12s, color 0.12s; }
  .tab-btn.active { background: var(--color-green); color: white; }
  #chat-panel, #checklist-panel { display: flex; flex-direction: column; flex: 1; overflow: hidden; }
  .hidden { display: none !important; }
  #messages { flex: 1; overflow-y: auto; padding: 14px; display: flex; flex-direction: column; gap: 10px; }
  .msg { display: flex; flex-direction: column; max-width: 88%; }
  .msg.user { align-self: flex-end; align-items: flex-end; }
  .msg.bot { align-self: flex-start; align-items: flex-start; }
  .bubble { padding: 10px 14px; border-radius: 14px; font-size: 13px; line-height: 1.65; color: var(--color-text); }
  .msg.user .bubble { background: var(--color-green); color: white; border-bottom-right-radius: 4px; }
  .msg.bot .bubble { background: var(--color-bg-secondary); border: 0.5px solid var(--color-border); border-bottom-left-radius: 4px; }
  .bubble a { color: var(--color-green-dark); text-decoration: underline; cursor: pointer; }
  .bubble a:hover { color: #085041; }
  .msg.user .bubble a { color: #9FE1CB; }
  .bubble p { margin: 0 0 8px; } .bubble p:last-child { margin-bottom: 0; }
  .bubble ul, .bubble ol { padding-left: 18px; margin: 6px 0 8px; }
  .bubble ul:last-child, .bubble ol:last-child { margin-bottom: 0; }
  .bubble li { margin-bottom: 4px; line-height: 1.55; } .bubble li:last-child { margin-bottom: 0; }
  .bubble strong { font-weight: 600; }
  .chips { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 7px; }
  .chip { background: var(--color-bg); border: 0.5px solid var(--color-green); color: var(--color-green-dark); font-size: 11.5px; padding: 4px 10px; border-radius: 20px; cursor: pointer; font-family: var(--font); transition: background 0.12s; }
  .chip:hover { background: var(--color-green-light); }
  #input-area { border-top: 0.5px solid var(--color-border); padding: 9px 11px; display: flex; gap: 7px; align-items: flex-end; flex-shrink: 0; }
  #user-input { flex: 1; border: 0.5px solid var(--color-border-secondary); border-radius: 18px; padding: 7px 13px; font-size: 13px; font-family: var(--font); color: var(--color-text); background: var(--color-bg); outline: none; resize: none; line-height: 1.4; max-height: 80px; overflow-y: auto; }
  #user-input:focus { border-color: var(--color-green); }
  #send-btn { width: 32px; height: 32px; border-radius: 50%; background: var(--color-green); border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: background 0.12s; }
  #send-btn:hover { background: var(--color-green-dark); }
  #send-btn:disabled { background: var(--color-border); cursor: default; }
  #send-btn svg { width: 14px; height: 14px; fill: white; }
  .typing { display: flex; gap: 4px; padding: 10px 13px; background: var(--color-bg-secondary); border: 0.5px solid var(--color-border); border-radius: 14px; border-bottom-left-radius: 4px; width: fit-content; }
  .dot { width: 5px; height: 5px; background: var(--color-text-secondary); border-radius: 50%; animation: bounce 1.1s ease-in-out infinite; }
  .dot:nth-child(2) { animation-delay: 0.18s; } .dot:nth-child(3) { animation-delay: 0.36s; }
  @keyframes bounce { 0%,80%,100%{transform:translateY(0)} 40%{transform:translateY(-4px)} }
  #checklist-panel { overflow: hidden; display: flex; flex-direction: column; }
  #progress-sticky { flex-shrink: 0; background: var(--color-bg); border-bottom: 0.5px solid var(--color-border); padding: 12px 15px 10px; z-index: 5; }
  .prog-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
  .prog-label-left { font-size: 12px; font-weight: 600; color: var(--color-text); }
  .prog-label-right { display: flex; align-items: baseline; gap: 4px; }
  .prog-pct { font-size: 20px; font-weight: 600; color: var(--color-green); transition: all 0.4s cubic-bezier(.34,1.56,.64,1); line-height: 1; }
  .prog-of { font-size: 11px; color: var(--color-text-secondary); }
  .prog-track { width: 100%; height: 10px; background: var(--color-bg-secondary); border-radius: 10px; overflow: hidden; }
  .prog-fill { height: 100%; border-radius: 10px; background: var(--color-green); transition: width 0.55s cubic-bezier(.34,1.56,.64,1); position: relative; overflow: hidden; }
  .prog-fill::after { content: ''; position: absolute; top: 0; left: -100%; width: 60%; height: 100%; background: rgba(255,255,255,0.28); animation: shimmer 2.4s ease-in-out infinite; }
  @keyframes shimmer { 0%{left:-60%} 100%{left:160%} }
  .prog-milestone-row { display: flex; justify-content: space-between; margin-top: 6px; }
  .prog-milestone { display: flex; flex-direction: column; align-items: center; gap: 2px; }
  .prog-milestone-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--color-border-secondary); transition: background 0.3s, transform 0.3s cubic-bezier(.34,1.56,.64,1); }
  .prog-milestone-dot.reached { background: var(--color-green); transform: scale(1.3); }
  .prog-milestone-dot.completed { background: var(--color-green); }
  .prog-milestone-lbl { font-size: 9.5px; color: var(--color-text-secondary); }
  .prog-milestone-lbl.reached { color: var(--color-green-dark); font-weight: 600; }
  .prog-message { font-size: 11px; color: var(--color-green-dark); text-align: center; margin-top: 5px; min-height: 15px; font-weight: 600; }
  #checklist-scroll { flex: 1; overflow-y: auto; padding: 10px 15px 14px; }
  .cl-topbar { display: flex; align-items: center; gap: 6px; margin-bottom: 8px; flex-wrap: wrap; }
  .cl-title { font-size: 13px; font-weight: 600; color: var(--color-text); flex: 1; }
  .cl-action-btn { font-size: 11px; font-family: var(--font); background: none; border: 0.5px solid var(--color-border-secondary); border-radius: var(--radius-md); padding: 4px 9px; cursor: pointer; color: var(--color-text-secondary); display: flex; align-items: center; gap: 4px; transition: color 0.12s; }
  .cl-action-btn:hover { color: var(--color-text); }
  .cl-action-btn svg { width: 11px; height: 11px; fill: currentColor; }
  .cl-section { margin-bottom: 12px; }
  .cl-section-title { font-size: 10.5px; font-weight: 600; color: var(--color-green-dark); text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 6px; padding-bottom: 4px; border-bottom: 0.5px solid var(--color-border); }
  .cl-item { border-bottom: 0.5px solid var(--color-border); padding: 7px 0 4px; }
  .cl-item:last-child { border-bottom: none; }
  .cl-item-row { display: flex; align-items: flex-start; gap: 8px; cursor: pointer; }
  .cl-item-row:hover .cl-box { border-color: var(--color-green); }
  .cl-box { width: 15px; height: 15px; border: 1.5px solid var(--color-border-secondary); border-radius: 4px; flex-shrink: 0; margin-top: 2px; display: flex; align-items: center; justify-content: center; transition: background 0.15s, border-color 0.15s; }
  .cl-box.checked { background: var(--color-green); border-color: var(--color-green); }
  .cl-box.just-checked { animation: pop 0.35s cubic-bezier(.34,1.56,.64,1); }
  @keyframes pop { 0%{transform:scale(1)} 40%{transform:scale(1.45)} 100%{transform:scale(1)} }
  .cl-box.checked::after { content: ''; display: block; width: 8px; height: 4px; border-left: 1.5px solid white; border-bottom: 1.5px solid white; transform: rotate(-45deg) translateY(-1px); }
  .cl-label { font-size: 12.5px; line-height: 1.5; color: var(--color-text); flex: 1; }
  .cl-label.done { color: var(--color-text-secondary); text-decoration: line-through; }
  .cl-item-actions { display: flex; margin-top: 3px; padding-left: 23px; }
  .cl-note-toggle { font-size: 11px; color: var(--color-text-secondary); background: none; border: none; cursor: pointer; font-family: var(--font); padding: 0; }
  .cl-note-toggle:hover { color: var(--color-green-dark); }
  .cl-note-area { margin-top: 4px; padding-left: 23px; }
  .cl-note-input { width: 100%; font-size: 12px; font-family: var(--font); border: 0.5px solid var(--color-border-secondary); border-radius: var(--radius-md); padding: 5px 8px; color: var(--color-text); background: var(--color-bg); resize: none; min-height: 48px; outline: none; line-height: 1.5; }
  .cl-note-input:focus { border-color: var(--color-green); }
  .cl-note-display { font-size: 11.5px; color: var(--color-text-secondary); background: var(--color-bg-secondary); border-radius: var(--radius-md); padding: 4px 8px; line-height: 1.5; font-style: italic; }
  .cl-note-btns { display: flex; gap: 5px; margin-top: 3px; }
  .cl-note-save { font-size: 11px; font-family: var(--font); background: var(--color-green); color: white; border: none; border-radius: var(--radius-md); padding: 3px 9px; cursor: pointer; }
  .cl-note-save:hover { background: var(--color-green-dark); }
  .cl-note-del { font-size: 11px; font-family: var(--font); background: none; color: var(--color-text-secondary); border: 0.5px solid var(--color-border-secondary); border-radius: var(--radius-md); padding: 3px 9px; cursor: pointer; }
  .auto-badge { font-size: 9.5px; background: var(--color-green-light); color: var(--color-green-dark); border-radius: 10px; padding: 1px 6px; margin-left: 5px; font-weight: 600; }
  .cl-empty { text-align: center; padding: 32px 20px; color: var(--color-text-secondary); font-size: 13px; line-height: 1.6; }
  .cl-empty strong { display: block; font-size: 14px; font-weight: 600; color: var(--color-text); margin-bottom: 6px; }
  .cl-pick-item { display: flex; align-items: center; padding: 9px 0; border-bottom: 0.5px solid var(--color-border); cursor: pointer; font-size: 13px; color: var(--color-text); }
  .cl-pick-item:last-child { border-bottom: none; }
  .cl-pick-item:hover { color: var(--color-green-dark); }
  .cl-pick-arrow { font-size: 11px; color: var(--color-text-secondary); margin-left: auto; }
  .confetti-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 20; border-radius: var(--radius-lg); }
  .email-modal { position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.35); display: flex; align-items: center; justify-content: center; z-index: 30; border-radius: var(--radius-lg); }
  .email-modal-inner { background: var(--color-bg); border-radius: var(--radius-lg); padding: 20px; width: 290px; border: 0.5px solid var(--color-border); }
  .email-modal-title { font-size: 13.5px; font-weight: 600; color: var(--color-text); margin-bottom: 5px; }
  .email-modal-sub { font-size: 12px; color: var(--color-text-secondary); margin-bottom: 11px; line-height: 1.5; }
  .email-modal-input { width: 100%; border: 0.5px solid var(--color-border-secondary); border-radius: var(--radius-md); padding: 7px 10px; font-size: 13px; font-family: var(--font); color: var(--color-text); background: var(--color-bg); outline: none; }
  .email-modal-input:focus { border-color: var(--color-green); }
  .email-modal-actions { display: flex; gap: 7px; margin-top: 11px; justify-content: flex-end; }
  .email-modal-cancel { font-size: 12px; font-family: var(--font); background: none; border: 0.5px solid var(--color-border-secondary); border-radius: var(--radius-md); padding: 5px 12px; cursor: pointer; color: var(--color-text-secondary); }
  .email-modal-send { font-size: 12px; font-family: var(--font); background: var(--color-green); color: white; border: none; border-radius: var(--radius-md); padding: 5px 12px; cursor: pointer; }
  .email-modal-send:hover { background: var(--color-green-dark); }
  .email-modal-msg { font-size: 12px; color: var(--color-green-dark); margin-top: 7px; }
</style>
</head>
<body>
<div id="app">
  <div id="header">
    <div class="header-icon"><svg viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5S10.62 6.5 12 6.5s2.5 1.12 2.5 2.5S13.38 11.5 12 11.5z"/></svg></div>
    <div class="header-text"><h2>Jersey City Farmers Market Vendor Setup Guide</h2><p>Powered by Jersey City HHS</p></div>
    <div class="tab-bar">
      <button class="tab-btn active" id="tab-chat" onclick="switchTab('chat')">Chat</button>
      <button class="tab-btn" id="tab-checklist" onclick="switchTab('checklist')">My Checklist</button>
    </div>
  </div>
  <div id="chat-panel">
    <div id="messages"></div>
    <div id="input-area">
      <textarea id="user-input" placeholder="Ask anything about becoming a vendor..." rows="1"></textarea>
      <button id="send-btn"><svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg></button>
    </div>
  </div>
  <div id="checklist-panel" class="hidden">
    <div id="progress-sticky">
      <div class="prog-header">
        <span class="prog-label-left" id="prog-type-label">Your progress</span>
        <div class="prog-label-right">
          <span class="prog-pct" id="prog-pct">0%</span>
          <span class="prog-of" id="prog-of">0 of 0 steps</span>
        </div>
      </div>
      <div class="prog-track"><div class="prog-fill" id="prog-fill" style="width:0%"></div></div>
      <div class="prog-milestone-row" id="prog-milestones"></div>
      <div class="prog-message" id="prog-message"></div>
    </div>
    <div id="checklist-scroll"></div>
  </div>
  <canvas class="confetti-canvas" id="confetti-canvas"></canvas>
  <div id="email-modal-container"></div>
</div>

<script>
const CHECKLIST_KEY='jc_vendor_checklist_v2';
const ANALYTICS_KEY='jc_vendor_analytics_v1';
const HHS_URL='https://www.jerseycitynj.gov/cityhall/health';

const CHECKLISTS={
  food_general:{label:"Food Vendor — General",sections:[
    {title:"1. Find your market",items:[{id:"fm1",text:"Research available Jersey City farmers markets"},{id:"fm2",text:"Contact your chosen market sponsor to apply as a vendor"},{id:"fm3",text:"Confirm you've been approved and added to the vendor list"}]},
    {title:"2. Gather your documents",items:[{id:"fd1",text:"Current Health Dept. license for your commercial kitchen (valid through event date)"},{id:"fd2",text:"Most recent kitchen health inspection report"},{id:"fd3",text:"Valid driver's license or state-issued ID"},{id:"fd4",text:"NJ Certificate of Authority"},{id:"fd5",text:"Federal Tax ID or Social Security card"},{id:"fd6",text:"Invoice from your food source"},{id:"fd7",text:"Food Protection Certificate or ServSafe cert (at least one employee)"},{id:"fd8",text:"Proof of $500,000 business liability insurance"},{id:"fd9",text:"Completed Temporary Food Vendor Application form"}]},

    {title:"4. At the market",items:[{id:"fat1",text:"Display your permit in a visible location at your booth"},{id:"fat2",text:"Ensure at least one employee has a valid food handler certificate on site"},{id:"fat3",text:"If accepting SNAP/EBT or WIC benefits, post a sign at your booth"}]}
  ]},
  food_cottage:{label:"Cottage Food Vendor",sections:[
    {title:"1. Find your market",items:[{id:"cfm1",text:"Research available Jersey City farmers markets"},{id:"cfm2",text:"Contact your chosen market sponsor to apply as a vendor"},{id:"cfm3",text:"Confirm you've been approved and added to the vendor list"}]},
    {title:"2. Get your NJ Cottage Food License",items:[{id:"cfl1",text:"Complete the NJ Cottage Food License application"},{id:"cfl2",text:"Prepare a Product Questionnaire for each product, frosting, and filling"},{id:"cfl3",text:"Gather proof of water potability (well water report or recent water bill)"},{id:"cfl4",text:"Obtain a Food Manager's Certificate"},{id:"cfl5",text:"Email application + docs to cfo@doh.nj.gov"},{id:"cfl6",text:"Pay $100 state application fee"},{id:"cfl7",text:"Receive NJ Cottage Food License"}]},

    {title:"4. At the market",items:[{id:"cfat1",text:"Display your permit in a visible location at your booth"},{id:"cfat2",text:"Ensure at least one employee has a valid food handler certificate on site"}]}

  food_truck:{label:"Food Truck Vendor",sections:[

    {title:"3. Gather raw meat-specific documents",items:[{id:"rmx1",text:"USDA Grant of Inspection from your slaughterhouse (required annually)"},{id:"rmx2",text:"Most recent invoice from slaughterhouse showing they package the product"},{id:"rmx3",text:"If using a butcher shop: their most recent health inspection and license"},{id:"rmx4",text:"At least one employee must have a valid food handler certificate"}]},
    {title:"4. Apply for your permit",items:[{id:"rmp1",text:"Print all documents (no email submissions accepted)"},{id:"rmp2",text:"Visit JC Bureau of Licensing in person: 1 Jackson Square, Jersey City, NJ 07305"},{id:"rmp3",text:"Pay permit fee (cash, debit, or credit card)"}]},
    {title:"5. At the market",items:[{id:"rmat1",text:"Display your permit in a visible location"},{id:"rmat2",text:"Ensure at least one employee with food handler cert is on site"}]}
  ]},

const MILESTONES=[25,50,75,100];
const MILESTONE_MSGS={25:"Great start — you're on your way!",50:"Halfway there — keep going!",75:"Almost done — you're so close!",100:"You did it! All steps complete!"};
let checklistState={},notes={},openNotes={},activeChecklist=null,autoCheckedIds=new Set(),lastPct=0,isLoading=false,conversationHistory=[];
let sessionId,userId,sessionStart,currentPctMilestone=0;

function lsLoad(){try{const r=localStorage.getItem(CHECKLIST_KEY);if(r){const p=JSON.parse(r);checklistState=p.checks||{};notes=p.notes||{};activeChecklist=p.activeChecklist||null;autoCheckedIds=new Set(p.autoCheckedIds||[]);}}catch(e){}}
function lsSave(){try{localStorage.setItem(CHECKLIST_KEY,JSON.stringify({checks:checklistState,notes,activeChecklist,autoCheckedIds:[...autoCheckedIds]}));}catch(e){}}
function getCompletion(k){let total=0,done=0;CHECKLISTS[k].sections.forEach(s=>s.items.forEach(i=>{total++;if(checklistState[i.id])done++;}));return{total,done};}

function generateId(prefix){return prefix+'_'+Math.random().toString(36).slice(2,10)+Date.now().toString(36);}
function detectDevice(){return(window.innerWidth||screen.width)<=768?'mobile':'desktop';}

function loadAnalytics(){try{const r=localStorage.getItem(ANALYTICS_KEY);if(r)return JSON.parse(r);}catch(e){}return{totalSessions:0,uniqueUsers:{},sessionLog:[],businessNames:[]};}
function saveAnalytics(data){try{localStorage.setItem(ANALYTICS_KEY,JSON.stringify(data));}catch(e){}}

function initAnalytics(){
  sessionId=generateId('s');sessionStart=Date.now();
  const device=detectDevice();
  let analytics=loadAnalytics();
  let storedUid=localStorage.getItem('jc_uid');
  if(!storedUid){storedUid=generateId('u');localStorage.setItem('jc_uid',storedUid);}
  userId=storedUid;
  const isNewUser=!analytics.uniqueUsers[userId];
  if(isNewUser)analytics.uniqueUsers[userId]={firstSeen:Date.now(),sessions:0};
  analytics.uniqueUsers[userId].sessions=(analytics.uniqueUsers[userId].sessions||0)+1;
  analytics.uniqueUsers[userId].lastSeen=Date.now();
  analytics.totalSessions=(analytics.totalSessions||0)+1;
  analytics.sessionLog=analytics.sessionLog||[];
  analytics.sessionLog.push({id:sessionId,userId,device,startTime:Date.now(),durationSeconds:0,checklist:{type:null,milestones:[],finalPct:0,engaged:false},isNewUser});
  saveAnalytics(analytics);
  window.addEventListener('beforeunload',()=>updateSessionDuration());
  setInterval(()=>updateSessionDuration(),15000);
}

function updateSessionDuration(){
  const analytics=loadAnalytics();
  const idx=analytics.sessionLog.findIndex(s=>s.id===sessionId);
  if(idx>=0){analytics.sessionLog[idx].durationSeconds=Math.round((Date.now()-sessionStart)/1000);saveAnalytics(analytics);}
}

function recordChecklistMilestone(pct){
  if(pct<=currentPctMilestone)return;currentPctMilestone=pct;
  const analytics=loadAnalytics();
  const idx=analytics.sessionLog.findIndex(s=>s.id===sessionId);
  if(idx>=0){analytics.sessionLog[idx].checklist.type=activeChecklist;analytics.sessionLog[idx].checklist.finalPct=pct;analytics.sessionLog[idx].checklist.engaged=true;if(!analytics.sessionLog[idx].checklist.milestones.includes(pct))analytics.sessionLog[idx].checklist.milestones.push(pct);saveAnalytics(analytics);}
}

function recordBusinessName(name){
  if(!name||name.trim().length<2)return;
  const analytics=loadAnalytics();
  analytics.businessNames=analytics.businessNames||[];
  analytics.businessNames.push({name:name.trim(),userId,sessionId,timestamp:Date.now()});
  saveAnalytics(analytics);
}

function updateProgressBar(animate){
  if(!activeChecklist){document.getElementById('progress-sticky').style.display='none';return;}
  document.getElementById('progress-sticky').style.display='block';
  const{total,done}=getCompletion(activeChecklist);
  const pct=total>0?Math.round((done/total)*100):0;
  document.getElementById('prog-type-label').textContent=CHECKLISTS[activeChecklist].label;
  document.getElementById('prog-of').textContent=`${done} of ${total} steps`;
  const pctEl=document.getElementById('prog-pct'),fillEl=document.getElementById('prog-fill');
  pctEl.textContent=pct+'%';fillEl.style.width=pct+'%';
  document.getElementById('prog-milestones').innerHTML=MILESTONES.map(m=>{const r=pct>=m;return`<div class="prog-milestone"><div class="prog-milestone-dot ${r?(pct>m?'completed':'reached'):''}"></div><span class="prog-milestone-lbl ${pct===m?'reached':''}">${m}%</span></div>`;}).join('');
  let msg='';for(const m of[100,75,50,25]){if(pct>=m){msg=MILESTONE_MSGS[m];break;}}
  document.getElementById('prog-message').textContent=msg;
  if(animate&&pct>lastPct){
    pctEl.style.transform='scale(1.25)';pctEl.style.color='#0F6E56';
    setTimeout(()=>{pctEl.style.transform='scale(1)';pctEl.style.color='';},400);
    for(const m of MILESTONES){if(pct>=m&&lastPct<m){launchConfetti();recordChecklistMilestone(pct);break;}}
  }
  if(pct>0)recordChecklistMilestone(pct);
  lastPct=pct;
}

function launchConfetti(){
  const canvas=document.getElementById('confetti-canvas'),ctx=canvas.getContext('2d');
  canvas.width=canvas.offsetWidth;canvas.height=canvas.offsetHeight;
  const colors=['#1D9E75','#5DCAA5','#9FE1CB','#E1F5EE','#0F6E56','#FAC775','#ffffff'];
  const pieces=Array.from({length:65},()=>({x:Math.random()*canvas.width,y:-20-Math.random()*80,r:Math.random()*5+2,color:colors[Math.floor(Math.random()*colors.length)],tilt:Math.random()*10-5,tileAngle:0,tiltAngleInc:Math.random()*0.04+0.02,vx:(Math.random()-0.5)*1.8,vy:Math.random()*1.4+0.8,opacity:1,shape:Math.random()>0.5?'rect':'circle',fadeStart:canvas.height*0.72}));
  let frame=0;
  (function draw(){ctx.clearRect(0,0,canvas.width,canvas.height);let any=false;pieces.forEach(p=>{if(p.opacity<=0)return;any=true;ctx.save();ctx.globalAlpha=p.opacity;ctx.fillStyle=p.color;ctx.translate(p.x,p.y);ctx.rotate(p.tilt*Math.PI/180);p.shape==='rect'?ctx.fillRect(-p.r,-p.r/2,p.r*2,p.r):(ctx.beginPath(),ctx.arc(0,0,p.r,0,Math.PI*2),ctx.fill());ctx.restore();p.tileAngle+=p.tiltAngleInc;p.tilt=Math.sin(p.tileAngle)*12;p.x+=p.vx;p.y+=p.vy;p.vy+=0.025;if(p.y>p.fadeStart)p.opacity-=0.018;});frame++;if(frame<220&&any)requestAnimationFrame(draw);else ctx.clearRect(0,0,canvas.width,canvas.height);})();
}

function formatBotText(raw){
  const stripped=raw.replace(/\[CHECKLIST:[a-z_]+\]/g,'').replace(/\[CHECK:[a-z0-9_]+\]/g,'').replace(/\[BUSINESS:[^\]]+\]/g,'').trim();
  const lines=stripped.split('\n');const blocks=[];let i=0;
  while(i<lines.length){
    const line=lines[i];
    if(/^#{1,3} /.test(line)){blocks.push({type:'heading',text:line.replace(/^#{1,3} /,'')});i++;continue;}
    if(/^(\*|-|\d+\.) /.test(line)){
      const items=[],isOrdered=/^\d+\. /.test(line);
      while(i<lines.length&&/^(\*|-|\d+\.) /.test(lines[i])){items.push(lines[i].replace(/^(\*|-|\d+\.) /,''));i++;}
      blocks.push({type:'list',ordered:isOrdered,items});continue;
    }
    if(line.trim()===''){if(blocks.length&&blocks[blocks.length-1].type!=='blank')blocks.push({type:'blank'});i++;continue;}
    if(blocks.length&&blocks[blocks.length-1].type==='para'){blocks[blocks.length-1].text+='\n'+line;}
    else{blocks.push({type:'para',text:line});}
    i++;
  }
  function inlineFormat(t){return t.replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>').replace(/\[([^\]]+)\]\(mailto:([^)]+)\)/g,'<a href="mailto:$2">$1</a>').replace(/\[([^\]]+)\]\((https?:\/\/[^)]+)\)/g,(m,label,url)=>`<a href="${url.replace(/"/g,'%22')}" target="_blank" rel="noopener">${label}</a>`).replace(/(?<![">])(https?:\/\/[^\s<\]"]+)/g,(m,url)=>`<a href="${url.replace(/"/g,'%22')}" target="_blank" rel="noopener">${url}</a>`);}
  let html='';
  blocks.forEach(block=>{
    if(block.type==='blank')return;
    if(block.type==='heading'){html+=`<p><strong>${inlineFormat(block.text)}</strong></p>`;return;}
    if(block.type==='list'){const tag=block.ordered?'ol':'ul';html+=`<${tag}>${block.items.map(it=>`<li>${inlineFormat(it)}</li>`).join('')}</${tag}>`;return;}
    if(block.type==='para'){html+=`<p>${block.text.split('\n').map(l=>inlineFormat(l)).join('<br>')}</p>`;}
  });
  return html;
}

function addMessage(text,sender,chips){

  messagesEl.appendChild(div);scrollDown();
}

Food vendors need Temporary Food Vendor Permit from JC Bureau of Licensing. Docs printed, in person only.

async function callAPI(userMessage){
  conversationHistory.push({role:'user',content:userMessage});setLoading(true);showTyping();
  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,system:SYSTEM_PROMPT,messages:conversationHistory})});
    const data=await res.json();removeTyping();
    const reply=data.content?.map(b=>b.type==='text'?b.text:'').join('')||"I'm sorry, I had trouble responding. Please try again.";
    conversationHistory.push({role:'assistant',content:reply});
    const{clKey,checkIds,businessName}=extractTags(reply);
    let changed=false;
    if(clKey&&CHECKLISTS[clKey]){
      const analytics=loadAnalytics();const idx=analytics.sessionLog.findIndex(s=>s.id===sessionId);
      if(idx>=0){analytics.sessionLog[idx].checklist.type=clKey;analytics.sessionLog[idx].checklist.engaged=true;saveAnalytics(analytics);}
      activeChecklist=clKey;lastPct=0;currentPctMilestone=0;changed=true;
    }
    if(checkIds.length>0){autoCheckItems(checkIds);changed=true;}
    if(changed){lsSave();updateProgressBar(true);}
    if(businessName)recordBusinessName(businessName);
    addMessage(reply,'bot');
    if(checkIds.length>0){setTimeout(()=>{const tb=document.getElementById('tab-checklist');tb.style.background='#1D9E75';tb.style.color='white';setTimeout(()=>{if(!tb.classList.contains('active')){tb.style.background='';tb.style.color='';}},2000);},500);}
  }catch(e){removeTyping();addMessage("Sorry, I ran into a connection issue. Please try again in a moment.",'bot');}
  setLoading(false);
}

function handleSend(text){const msg=(text||inputEl.value).trim();if(!msg||isLoading)return;inputEl.value='';inputEl.style.height='auto';addMessage(msg,'user');callAPI(msg);}
sendBtn.onclick=()=>handleSend();
inputEl.addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();handleSend();}});
inputEl.addEventListener('input',()=>{inputEl.style.height='auto';inputEl.style.height=Math.min(inputEl.scrollHeight,80)+'px';});

lsLoad();
initAnalytics();
setTimeout(()=>{
  if(activeChecklist){const{done,total}=getCompletion(activeChecklist);lastPct=total>0?Math.round((done/total)*100):0;}
  const returning=activeChecklist!==null,cl=returning?CHECKLISTS[activeChecklist]:null;
  const{done,total}=returning?getCompletion(activeChecklist):{done:0,total:0};
  const pct=returning&&total>0?Math.round((done/total)*100):0;
  const welcome=returning
    ?`Welcome back to the **Jersey City Farmers Market Vendor Setup Guide**! 👋\n\nYour **${cl.label}** checklist is ${pct}% complete — ${done} of ${total} steps done. Tap **My Checklist** to keep going!\n\nWhat can I help you with today?`
    :`Welcome to the **Jersey City Farmers Market Vendor Setup Guide**! 👋\n\nI'm here to help you navigate everything you need to become an approved vendor at a Jersey City farmers market — from choosing the right market for your business, to getting your permits sorted with the [Jersey City Department of Health & Human Services](${HHS_URL}).\n\nAs we talk, I'll build a personalized checklist with a live progress tracker so you always know exactly where you stand.\n\nTo get started — what do you sell, and are you new to farmers markets?`;
  addMessage(welcome,'bot',returning
    ?["Continue where I left off","Show me all markets","I have a question"]
    :["I sell food products","I sell non-food / crafts","Show me all available markets","What permits do I need?"]);
},300);
</script>
